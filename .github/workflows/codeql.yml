name: CodeQL
on:
  pull_request: { branches: [master] }
  push: { branches: [master] }
  schedule: [{ cron: '17 3 * * 1' }]
  workflow_dispatch:
permissions: { contents: read }
jobs:
  analyze:
    permissions: { contents: read, security-events: write }
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      {
        fail-fast: false,
        matrix: { language: [javascript-typescript, python, actions] },
      }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with: { languages: '${{ matrix.language }}', build-mode: none }
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
